<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #2196F3;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>✏️ Update Student</h2>

    <form method="post">

        <input type="text" name="name" value="{{ student.name }}" required>

        <input type="number" name="age" value="{{ student.age }}" required>

        <input type="text" name="course" value="{{ student.course }}" required>

        <button type="submit">Update Student</button>

    </form>
</div>

</body>
</html>
