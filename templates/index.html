<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .box {
            background: white;
            width: 500px;
            margin: auto;
            padding: 20px;
            margin-top: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 80%;
        }

        button {
            padding: 10px;
            width: 85%;
            background: #4CAF50;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
        }

        a {
            color: red;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🎓 Student Management System</h2>

    <form action="/add" method="post">
        <input type="text" name="name" placeholder="Name" required>
        <input type="number" name="age" placeholder="Age" required>
        <input type="text" name="course" placeholder="Course" required>

        <button type="submit">Add Student</button>
    </form>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Action</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.age }}</td>
            <td>{{ student.course }}</td>

            <td>
                <a href="/delete/{{ loop.index0 }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
